name: Documentation issue
description: Report missing, confusing, or outdated project documentation.
title: '[Docs]: '
labels: ['documentation']
body:
  - type: textarea
    id: page
    attributes:
      label: Page or file
      description: Point to the README, CONTRIBUTING, SECURITY, CODE_OF_CONDUCT, CHANGELOG, docs file, or GitHub template.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is confusing, missing, or outdated?
    validations:
      required: true
  - type: checkboxes
    id: affected_area
    attributes:
      label: Affected area
      options:
        - label: README
        - label: Contributing flow
        - label: Agent Runtime adapters
        - label: llmwiki-serve setup
        - label: External Agent Runtime console usage
        - label: Knowledge Source endpoint protocol behavior
        - label: Security or secret-handling guidance
        - label: Release notes
  - type: textarea
    id: suggested
    attributes:
      label: Suggested improvement
  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety
      options:
        - label: This issue does not include credentials, tokens, private endpoint URLs, request logs with secrets, raw sensitive data, or screenshots exposing private infrastructure.
          required: true
