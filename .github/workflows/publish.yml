name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify publish toolchain
        run: |
          node --version
          npm --version
          node -e "const v = require('child_process').execFileSync('npm', ['--version'], {encoding: 'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && (v[1] < 5 || (v[1] === 5 && v[2] < 1)))) throw new Error('npm 11.5.1+ is required for trusted publishing')"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: A2A runtime smoke
        run: npm run test:e2e:a2a-runtime

      - name: Release package gate
        run: npm run pack:dry-run

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Publish package
        run: npm publish
